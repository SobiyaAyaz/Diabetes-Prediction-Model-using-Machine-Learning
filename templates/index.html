<!DOCTYPE html>
<html>
<head>
    <title>Diabetes Prediction</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #4A90E2, #50C9C3);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 380px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 5px;
            color: #2C3E50;
        }

        p {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 6px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        input:focus {
            border-color: #4A90E2;
            outline: none;
        }

        button {
            padding: 12px;
            width: 95%;
            background: #4A90E2;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #357ABD;
        }

        .result {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
        }

        .safe {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .risk {
            background: #fdecea;
            color: #c0392b;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Diabetes Prediction</h2>
    <p>AI-Based Health Risk Assessment</p>

    <form action="/predict" method="post">
        <input type="text" name="Pregnancies" placeholder="Pregnancies"><br>
        <input type="text" name="Glucose" placeholder="Glucose"><br>
        <input type="text" name="BloodPressure" placeholder="Blood Pressure"><br>
        <input type="text" name="SkinThickness" placeholder="Skin Thickness"><br>
        <input type="text" name="Insulin" placeholder="Insulin"><br>
        <input type="text" name="BMI" placeholder="BMI"><br>
        <input type="text" name="DiabetesPedigreeFunction" placeholder="DPF"><br>
        <input type="text" name="Age" placeholder="Age"><br>

        <button type="submit">Predict</button>
    </form>

    {% if prediction_text %}
        {% if "Not" in prediction_text %}
            <div class="result safe">
                {{ prediction_text }}
            </div>
        {% else %}
            <div class="result risk">
                {{ prediction_text }}
            </div>
        {% endif %}
    {% endif %}

</div>

</body>
</html>
